scientific_purpose:
  problem_statement: >
    Traditional environmental vulnerability assessments often map stressors directly to hazard indices or use
    regulatory threshold exceedance alone. This framework instead maps chronic stressors into physiological
    depletion of a species-specific adaptive margin and computes how that depletion weakens restoring force.
    The output is an amplification factor describing how much larger the response burden of an acute event becomes
    under stressed versus pristine background conditions.
  conceptual_innovations:
    - "Adaptive Margin A is a macroscopic DEB-derived state variable representing physiological buffering capacity."
    - "Vulnerability is defined as amplification of acute perturbation burden caused by reduced background-conditioned restoring force."
    - "Two separated timescales avoid needing Jacobian ecosystem matrices over large spatial rasters."
    - "Fubini's theorem shows integrated response burden scales as 1/lambda."
    - "Species defense parameters are anchored in Add-my-Pet DEB data."
    - "Stressor attack parameters are anchored through ECOTOX-derived NOEC/EC50/effect/taxon summaries."
    - "Compound memory now separates retention/carryover rho from bioaccumulation/internal magnification K."
    - "Arbitrary Gamma interaction parameters are being replaced by formal mixture toxicity logic; current ECOTOX runtime aggregation remains axis-wise additive, with full CA/IA reserved for later work."

mathematical_framework:
  notation:
    grid_cell: "g"
    time_or_month_index: "t or m"
    species_or_target_group: "q"
    raw_environment_vector: "R_{g,t}"
    ambient_chemical_concentration: "C_{j,t}"
    internal_chemical_burden: "B_{j,t}"
    retention_factor: "rho_j"
    bioaccumulation_factor: "K_j"
    effective_exposure: "e_j^(q)"
    mode_of_action_vector: "m_r^(q)"
    deb_axis_vector: "s_a^(q), a in {A,M,G,R}"
    adaptive_margin: "A"
    restoring_force: "lambda"
    amplification_factor: "F or mathcal{F}"
  phases:
    exposure_filtering:
      description: "Raw environmental variables are converted into species-specific effective exposure by contact/use/habitat multipliers."
      equation: "e_{j,g,t}^{(q)} = h_j^{(q)} R_{j,g,t}"
      code_object: "ExposureFilter"
      code_field: "multipliers::Vector{Float64}"
    chemical_memory:
      description: >
        Persistent or bioaccumulative compounds can carry over across months through an internal burden state.
        The implemented memory model has retention rho and bioaccumulation/internal magnification K as distinct parameters.
      implemented_equation: "B_{j,t} = rho_j * B_{j,t-1} + (1 - rho_j) * K_j * C_{j,t}"
      interpretation:
        rho: "monthly carryover/persistence; 0 means no memory, values near 1 mean slow decay"
        K: "equilibrium internal magnification factor; K=1 preserves concentration scale, K>1 represents bioaccumulation/internal load magnification"
      limiting_cases:
        stateless_equivalence: "rho=0 and K=1 implies B_t = C_t"
        retention_only: "rho>0 and K=1 implies lag/carryover without magnification"
        bioaccumulation: "rho>0 and K>1 implies carryover plus magnified internal burden"
        constant_exposure_equilibrium: "for constant C, B_t -> K*C"
      implementation_note: "Chemical memory B_t is separate from physiological condition memory Z_t. Z_t is not implemented in this task."
    nec_thresholding:
      description: "For empirical toxicants, concentrations or internal burdens below the No Effect Concentration create zero physiological burden."
      implemented_ecotox_runtime_equation: "x = max(0, B_or_C - NOEC_median) / (EC50_median - NOEC_median)"
      ecotox_approximation: "cstar_j is approximated as EC50_median - NOEC_median."
    mode_of_action_mapping:
      description: "Effective exposure is mapped into biological modes of action for ISIMIP-style runtime workflows."
      equation_linear: "m = U e"
      legacy_equation_with_interactions: "m_r = sum_j U_{rj} e_j + sum_{j<k} Gamma_{jk}^{(r)} e_j e_k"
      code_object: "ModeOfActionMapping"
      current_mode_names: ["thermal", "oxygen", "osmotic", "immune", "eutrophication", "toxic", "feeding", "physical"]
      current_isimip_variable_names: ["WT", "BOD", "TDS", "FC", "Nutrient", "Chemical", "Plastic"]
    moa_to_deb_axes:
      description: "Modes of action are mapped into four DEB physiological axes."
      equation_linear: "s = W m"
      code_object: "MoAToDEBMapping"
      deb_axis_order: ["assimilation", "maintenance", "growth", "reproduction"]
    ecotox_direct_attack_mapping:
      description: >
        ECOTOX runtime adapter can bypass the generic ISIMIP MoA layer for scalar/empirical toxicity calculations.
        It converts ECOTOX effect codes directly into DEB-axis burden, then uses existing DEB response machinery.
      active_stress_equation: "x = max(0, B_or_C - NOEC_median) / (EC50_median - NOEC_median)"
      burden_mapping: "record + concentration/internal burden -> (assimilation, maintenance, growth, reproduction)"
      response_mapping: "burden + DEBAxisParams -> A, lambda, amplification"
    mixture_toxicity:
      description: >
        Empirical ECOTOX workflows should eventually avoid arbitrary Gamma interaction scalars. Use Concentration Addition for
        stressors sharing effect/MoA and Independent Action for distinct effects/MoAs. Current runtime implementation aggregates
        records axis-wise after endpoint routing; full CA/IA is future work.
      concentration_addition:
        condition: "same MoA or same ECOTOX effect code"
        equation: "TU_total = sum_j TU_j"
      independent_action:
        condition: "distinct MoAs/effect codes"
        equation_probability_form: "Stress_total = 1 - prod_j (1 - E_j)"
        bounded_transform_if_needed: "E_j = x_j / (1 + x_j) for unbounded x_j"
    adaptive_margin:
      description: "Aggregate DEB-axis burden depletes species-specific baseline adaptive margin."
      equation: "A = A0 + omega_Z Z - dot(alpha_axes, s_axes)"
      no_buffer_equation: "A = A0 - dot(alpha_axes, s_axes)"
      code_object: "DEBAxisParams"
    restoring_force:
      description: "Adaptive margin determines recovery/restoring force via bounded Michaelis-Menten form."
      equation: "lambda = lambda_min + (lambda_max - lambda_min) * max(A,0) / (KA + max(A,0))"
      code_functions:
        - "restoring_force_from_margin(A, params::DEBAxisParams)"
        - "restoring_force_from_margin_grid(Agrid, params::DEBAxisParams)"
    amplification:
      description: "For identical acute event cost, integrated displacement burden is proportional to 1/lambda."
      perturbation_ode: "dy/dt = -lambda y + q_c C_event(t), y(0)=0"
      fubini_result: "AUC_y = (q_c / lambda) * AUC_C"
      amplification_equation: "F = lambda(A0) / lambda(A_background)"
      code_functions:
        - "amplification_from_margin(A, params::DEBAxisParams; A_control=params.A0)"
        - "amplification_from_margin_grid(Agrid, params::DEBAxisParams; A_control=params.A0)"

core_runtime_structs:
  DEBAxisParams:
    fields:
      A0: "Float64 = 1.0"
      alpha_axes: "NTuple{4, Float64} = (0.30, 0.35, 0.20, 0.15)"
      lambda_min: "Float64 = 0.04"
      lambda_max: "Float64 = 1.0"
      KA: "Float64 = 0.30"
      recovery_axes: "NTuple{4, Float64} = (0.10, 0.80, 0.10, 0.05)"
      use_axis_recovery_penalty: "Bool = false"
      use_buffer_recovery_factor: "Bool = false"
      beta_Z: "Float64 = 0.0"
    role: "Primary species defense parameter object; target of AmP adapter."
    axis_order: ["assimilation", "maintenance", "growth", "reproduction"]
    note: "alpha_axes are depletion/sensitivity coefficients, not necessarily normalized weights; they need not sum to one."
  EcotoxExposureState:
    fields:
      internal_burdens: "Dict{String, Float64}; keys are normalized digits-only CAS strings"
    role: "Mutable runtime state carrying internal compound burdens across months."
  ExposureFilter:
    fields:
      multipliers: "Vector{Float64}"
      name: "String = generic"
      description: "String = empty"
    role: "Species-specific exposure/contact multipliers h_j."
  ModeOfActionMapping:
    fields:
      U: "Matrix{Float64}"
      interactions: "Union{Nothing, Vector{Matrix{Float64}}} = nothing"
      clamp_nonnegative: "Bool = true"
      clamp_unit: "Bool = false"
    role: "Environmental-variable-to-mode-of-action mapping."
  MoAToDEBMapping:
    fields:
      W: "Matrix{Float64}"
      interactions: "Union{Nothing, Vector{Matrix{Float64}}} = nothing"
      clamp_nonnegative: "Bool = true"
      clamp_unit: "Bool = false"
    role: "Mode-of-action-to-DEB-axis mapping."
  SpeciesProfile:
    fields:
      name: "String"
      exposure_filter: "ExposureFilter"
      moa_mapping: "ModeOfActionMapping"
      moa_deb_mapping: "MoAToDEBMapping"
      deb_params: "DEBAxisParams"
      buffer_params: "Union{Nothing, ConditionBufferParams} = nothing"
      description: "String = empty"
    role: "Central runtime integration object for species-aware ISIMIP-style modeling."
  BackgroundParams:
    role: "Older/general background-stress parameter object."
  BackgroundStressor:
    role: "Scalar background stressor descriptor."
  ConditionBufferParams:
    role: "Optional dynamic condition/reserve buffer parameters; not yet used for monthly physiological carryover in current memory implementation."
  DEBAxisMapping:
    role: "Direct stressor-to-DEB-axis mapping, used by older/direct DEB path."
  PulseStressor:
    role: "Acute pulse/event stressor descriptor."
  TwoTimescaleSimulationResult:
    role: "Output object for two-timescale simulations."

runtime_execution_graph:
  isimip_scalar_or_cell_pipeline:
    - "values::AbstractVector -> apply_exposure_filter(values, profile.exposure_filter)"
    - "effective_exposure -> mode_of_action(effective_exposure, profile.moa_mapping)"
    - "modes -> moa_to_deb_axes(modes, profile.moa_deb_mapping)"
    - "DEB axes -> deb_adaptive_margin(axes, profile.deb_params)"
    - "margin -> restoring_force_from_margin(margin, profile.deb_params)"
    - "margin -> amplification_from_margin(margin, profile.deb_params)"
  isimip_grid_pipeline:
    - "layers::Vector{Matrix{Float64}} -> apply_exposure_filter_grid"
    - "filtered layers -> mode_of_action_grid"
    - "mode grids -> moa_to_deb_axes_grid"
    - "DEB-axis grids -> deb_adaptive_margin_grid"
    - "margin grid -> restoring_force_from_margin_grid"
    - "margin grid -> amplification_from_margin_grid"
  ecotox_stateless_runtime_pipeline:
    - "load_ecotox_library -> vector of JSON records"
    - "ecotox_filter_records -> relevant records by CAS/taxon/effect"
    - "concentrations Dict + records -> ecotox_records_to_deb_burden"
    - "burden + DEBAxisParams -> ecotox_burden_to_response"
    - "response contains A, lambda, amplification"
  ecotox_stateful_memory_pipeline:
    - "load_compound_memory_library -> memory records with retention rho and bioaccumulation K"
    - "EcotoxExposureState -> stores B_j,t by cas_norm"
    - "update_internal_burden! -> B_new = rho*B_old + (1-rho)*K*C"
    - "ecotox_records_to_deb_burden_stateful! -> updates B and uses B as effective ECOTOX concentration"
    - "ecotox_burden_to_response -> A, lambda, amplification"
  existing_pipeline_entrypoints:
    - "isimip_deb_pipeline(values, exposure_filter, moa_mapping, moa_deb_mapping, deb_params; ...)"
    - "isimip_deb_pipeline_grid(layers, exposure_filter, moa_mapping, moa_deb_mapping, deb_params; ...)"
  single_cell_return_shape: |
    (
        effective_values = effective_values,
        modes = modes,
        axes = axes,
        Z = Z,
        A = A,
        lambda = lambda,
        amplification = F
    )
  grid_return_shape: |
    (
        effective_layers = effective_layers,
        modes = modes,
        axes = axes,
        Z = buffer_grid,
        A = Agrid,
        lambda = lambdagrid,
        amplification = Fgrid
    )

