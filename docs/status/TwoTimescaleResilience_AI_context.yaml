ai_usage_instructions:
  primary_goal: >
    This YAML is intended to let future AI tools become immediately up to date on the package, theory,
    implementation structure, empirical pipelines, current integration state, and next likely development steps
    without requiring the user to re-explain the project.
  expected_ai_behavior:
