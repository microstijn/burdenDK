implementation_updates:
  - date: "2026-05-23"
    tranche: "AmP runtime integration Tranche 1"
    status: "completed"
    summary: >
      Implemented lightweight runtime adapter for Add-my-Pet species JSON library. The adapter loads
      data/AmP_Species_Library.json using JSON.jl and converts AmP records into existing DEBAxisParams.
    files_added:
      - "src/amp_library.jl"
      - "test/test_amp_library.jl"
    files_modified:
      - "src/TwoTimescaleResilience.jl"
      - "test/runtests.jl"
      - "test/test_ecotox.jl"
    main_module_update:
      included_file: "src/amp_library.jl"
      new_exports:
        - "amp_species_key"
        - "load_amp_species_library"
        - "validate_amp_record"
        - "amp_record_to_deb_params"
        - "amp_species_deb_params"
    implemented_functions:
      amp_species_key:
        signature: "amp_species_key(name::AbstractString)::String"
        behavior: "Strips leading/trailing whitespace and collapses any run of whitespace to a single underscore; existing underscores are preserved."
      load_amp_species_library:
        signature: "load_amp_species_library(path::AbstractString = joinpath(\"data\", \"AmP_Species_Library.json\"))"
        behavior: "Loads parsed JSON object using JSON.parsefile from JSON.jl. JSON3 is not used."
      validate_amp_record:
        signature: "validate_amp_record(record)::Bool"
        behavior: "Validates A0, alpha_axes, lambda_bounds.KA, lambda_bounds.lambda_min, lambda_bounds.lambda_max; throws ArgumentError for invalid records."
      amp_record_to_deb_params:
        signature: "amp_record_to_deb_params(record)::DEBAxisParams"
        behavior: "Validates and converts one AmP record to DEBAxisParams."
      amp_species_deb_params:
        signature: "amp_species_deb_params(library, species_name::AbstractString)::DEBAxisParams"
        behavior: "Supports exact JSON keys and human-readable names through amp_species_key; missing species throw KeyError; no silent defaults."
    test_coverage:
      - "Loads real data/AmP_Species_Library.json."
      - "Confirms Abatus_cordatus exists."
      - "Tests species-key normalization including multiple whitespace collapse."
      - "Validates Abatus_cordatus record."
      - "Converts Abatus_cordatus to DEBAxisParams and checks A0, alpha_axes, lambda_min, lambda_max, KA."
      - "Checks flexible lookup for Abatus_cordatus and Abatus cordatus."
      - "Checks baseline restoring force lambda0 ≈ 0.01097."
      - "Checks invalid records throw ArgumentError."
    additional_fix: >
      Full-suite execution exposed an ECOTOX fixture path issue. Since test_data/sample_results.txt existed,
      test_ecotox.jl was fixed to resolve fixture paths relative to the test/repository directory using @__DIR__
      instead of relying on current working directory. ECOTOX scientific logic was not changed.
    integration_state_after_update: >
      AmP JSON can now be consumed at runtime as DEBAxisParams. SpeciesProfile construction from AmP is not yet part of the package
      unless implemented later. Current example scripts can use amp_species_deb_params to replace deb_params in an existing default
      SpeciesProfile-derived workflow pattern.

current_runtime_usage_after_amp_tranche_1:
  minimal_usage: |
    using TwoTimescaleResilience

    amp = load_amp_species_library()
    params = amp_species_deb_params(amp, "Abatus cordatus")
    lambda0 = restoring_force_from_margin(params.A0, params)
  expected_lambda0_for_abatus: "approximately 0.01097"
  profile_like_usage_without_amp_species_profile: |
    base_profile = fish_profile()
    exposure_filter = base_profile.exposure_filter
    moa_mapping = base_profile.moa_mapping
    moa_deb_mapping = base_profile.moa_deb_mapping
    deb_params = amp_species_deb_params(amp, "Abatus cordatus")

    result = isimip_deb_pipeline(
        zeros(7),
        exposure_filter,
        moa_mapping,
        moa_deb_mapping,
        deb_params
    )

