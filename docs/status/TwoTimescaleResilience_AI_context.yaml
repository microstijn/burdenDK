          lambda_max: 0.011568702452292915
          lambda_min: 0.00899027004972587
    adapter_mapping_to_runtime:
      A0: "DEBAxisParams.A0"
      alpha_axes: "DEBAxisParams.alpha_axes as NTuple{4, Float64}; order assimilation, maintenance, growth, reproduction"
      lambda_bounds.lambda_min: "DEBAxisParams.lambda_min"
      lambda_bounds.lambda_max: "DEBAxisParams.lambda_max"
      lambda_bounds.KA: "DEBAxisParams.KA"
    sanity_check_for_abatus:
      lambda0_formula: "lambda_min + (lambda_max - lambda_min) * A0 / (KA + A0)"
      expected_lambda0_approx: 0.01097
    recommended_runtime_adapter_functions:
      - "load_amp_species_library(path)"
      - "amp_record_to_deb_params(record)::DEBAxisParams"
      - "amp_species_deb_params(library, species_key)::DEBAxisParams"
      - "amp_species_profile(library, species_key; exposure_filter, moa_mapping, moa_deb_mapping)::SpeciesProfile"
    recommended_validation:
      - "A0 > 0"
      - "KA > 0"
      - "lambda_min > 0"
      - "lambda_max >= lambda_min"
      - "length(alpha_axes) == 4"
      - "all alpha_axes finite and nonnegative"
    integration_state: >
      AmP output is already shaped nearly perfectly for DEBAxisParams. Integration requires lightweight loader/constructor functions,
      not modification of the core runtime engine.
  ecotox_attack_pipeline:
    source_database: "EPA ECOTOX ASCII database"
    current_script: "src/ECOTOXParser.jl"
    current_function: "parse_ecotox_data(results_path, tests_path, species_path, target_cas)"
    database_scale_context: "Raw ASCII database approximately 1.5 GB in project context."
    biological_role: "Empirical attack parameters: NEC/NOEC thresholds, EC50/tolerance scaling, taxonomic and effect-code routing."
    parser_capabilities_reported:
      - "Safely parses large ECOTOX ASCII files while bypassing mixed-type formatting traps."
      - "Joins results.txt, tests.txt via test_id, and species.txt via species_number."
      - "Calculates empirical medians for NOEC and EC50."
      - "Groups medians by taxonomic class and physiological effect code."
    key_outputs_needed_for_runtime:
      - "taxon_class"
      - "chemical or CAS identifier"
      - "effect code, e.g. MOR, GRO, REP"
      - "NOEC median as NEC threshold"
      - "EC50 median as tolerance/totoxicity scale"
      - "n_records for confidence/diagnostics"
    current_limitation: >
      Current observed function accepts a single target_cas. The runtime model likely needs a library-level interface for many stressors,
      many taxa, and many effect codes.
    recommended_runtime_adapter_functions:
      - "load_ecotox_library(path)"
      - "ecotox_records_for_taxon_and_stressors(library, taxon_class, stressors)"
      - "ecotox_effect_to_deb_axis(effect_code)::Symbol or index"
      - "ecotox_records_to_moa_mapping(records)::ModeOfActionMapping"
      - "ecotox_records_to_moa_deb_mapping(records)::MoAToDEBMapping"
      - "species_profile_from_libraries(species_key, taxon_class, amp_library, ecotox_library; exposure_filter, stressors)::SpeciesProfile"
    suggested_first_pass_effect_routing:
      MOR: "maintenance"
      GRO: "growth"
      REP: "reproduction"
      feeding_or_ingestion_or_BCM: "assimilation"
      ITX: "maintenance"
      MPH: "maintenance"
      DVP: "growth"
      FEC: "reproduction"
    integration_options:
      option_A_ecotox_modifies_moa_mapping:
        description: "Use ECOTOX to map raw chemical concentrations into MoA intensities through ModeOfActionMapping.U."
        best_when: "Maintaining explicit MoA layer is important."
      option_B_ecotox_modifies_moa_deb_mapping:
        description: "Use ECOTOX effect code directly to route burden to DEB axes through MoAToDEBMapping.W."
        best_when: "Fast first empirical integration is desired because ECOTOX is already grouped by physiological effect."
        recommendation: "Recommended first implementation."
      option_C_direct_deb_burden_preprocessor:
        description: "Compute DEB-axis burdens directly from ECOTOX records before calling DEB margin functions."
        caution: "This bypasses existing MoA abstractions and should only be used if clearly documented."
    recommended_first_empirical_formula:
      active_exposure: "x_j = max(0, C_j - NOEC_j) / (EC50_j - NOEC_j)"
      same_effect_CA: "x_effect_total = sum_j x_j for same effect code"
      distinct_effect_IA: "E_total = 1 - prod_j(1 - E_j) after bounded transform if needed"
    integration_state: >
      ECOTOX parser is built and tested but likely not yet wired into SpeciesProfile runtime mapping objects. The missing layer is an adapter
      from ECOTOX summaries to ModeOfActionMapping/MoAToDEBMapping or direct DEB-axis burdens.

current_main_module_state:
  file: "src/TwoTimescaleResilience.jl"
  interpretation: >
    The main module currently exposes the original two-timescale raster/resilience engine. It includes DEB, MoA, exposure,
    ISIMIP, species defaults, background, pulse, metrics, plotting, ASCII, and NetCDF files. It does not include AmP_Translator.jl
    or ECOTOXParser.jl at the observed time.
  implication: >
    A collaborator looking only at the main module would see a raster/DEB resilience package with default species and MoA mappings,
    but would not yet see the empirical AmP/ECOTOX grounding.
  recommended_decision:
    preferred: >
      Keep heavy raw parsers as offline builders if they depend on large external files, but include/export lightweight runtime library loaders
      and adapter constructors in the main package.
    alternative: >
      Include AmP_Translator.jl and ECOTOXParser.jl directly if reproducibility from raw databases should be part of the public API.
  recommended_new_file_names:
    - "amp_library.jl"
    - "ecotox_library.jl"
    - "empirical_profiles.jl"
  recommended_exports:
    - "load_amp_species_library"
    - "amp_record_to_deb_params"
    - "amp_species_deb_params"
    - "amp_species_profile"
    - "load_ecotox_library"
    - "ecotox_records_to_moa_deb_mapping"
    - "species_profile_from_libraries"

worked_example_abatus_cordatus:
  species: "Abatus cordatus"
  species_key: "Abatus_cordatus"
  amp_parameters:
    A0: 1539.9871108901957
    alpha_M: 0.4250074376301585
    lambda_min: 0.00899027004972587
    lambda_max: 0.011568702452292915
    KA: 461.99613326705867
  baseline_restoring_force:
    formula: "lambda0 = lambda_min + (lambda_max - lambda_min) * A0 / (KA + A0)"
    approximate_value: 0.01097
    units: "d^-1"
  hypothetical_ecotox_attack:
    stressor_type: "heavy metal maintenance-axis toxicant with effect MOR"
    NOEC_mg_L: 2.0
    EC50_mg_L: 4.5
    ambient_concentration_mg_L: 12.0
    active_exposure: "e = max(0, 12.0 - 2.0) = 10.0"
    slope: "W_M = 1/(4.5 - 2.0) = 0.4"
    daily_stress: "s_daily = 4.0"
    cumulative_stress_assumed: "s_M = 2000"
  stressed_margin:
    formula: "A_stressed = max(0, A0 - alpha_M * s_M)"
    approximate_value: 689.99
  stressed_restoring_force:
    formula: "lambda_stressed = lambda_min + (lambda_max - lambda_min) * A_stressed / (KA + A_stressed)"
    approximate_value: 0.01053
  amplification:
    formula: "F = lambda0 / lambda_stressed"
    approximate_value: 1.0418
    interpretation: "An acute perturbation would produce approximately 4.2% larger integrated response burden than under pristine conditions."
  caution: >
    The cumulative s_M = 2000 in the worked example is an illustrative severe monthly aggregation assumption, not directly derived from the one-day ECOTOX calculation unless a temporal aggregation rule is explicitly implemented.

known_design_tensions_and_resolutions:
  gamma_vs_CA_IA:
    issue: "Early derivations and code structs include optional Gamma/interactions matrices. Empirical theory now prefers CA/IA mixture toxicity."
    resolution: >
      Retain interactions fields for legacy/default simulations, but set interactions=nothing for empirical ECOTOX workflows and implement CA/IA in adapters/preprocessing.
  species_defaults_vs_amp:
    issue: "species_defaults.jl provides generic SpeciesProfile constructors; AmP provides species-specific empirical defense parameters."
    resolution: "Keep species_defaults for demos/tests/fallbacks; use AmP adapters for empirical species profiles."
  default_isimip_moa_vs_ecotox:
    issue: "default_isimip_moa.jl provides phenomenological ISIMIP variable-to-MoA mapping; ECOTOX provides chemical/effect/taxon empirical mappings."
    resolution: >
      Let ECOTOX-derived mappings override or augment defaults for chemical stressors. Retain defaults for variables without ECOTOX analogues such as temperature, BOD, TDS, pathogens, nutrients, plastics, depending on context.
  alpha_axes_language:
    issue: "alpha_axes may be described as weights, but observed values need not sum to one."
    resolution: "Call them depletion coefficients or sensitivity coefficients unless they are explicitly normalized."
  code_KA_vs_math_K_A:
    issue: "Code uses KA, manuscript uses K_A."
    resolution: "Document KA == K_A."

