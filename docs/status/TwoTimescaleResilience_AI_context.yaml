  Core pipeline: values/layers -> ExposureFilter -> ModeOfActionMapping -> MoAToDEBMapping -> DEBAxisParams -> margin -> lambda -> amplification.
  Existing spatial engine: isimip_deb_pipeline and isimip_deb_pipeline_grid.
  AmP Tranche 1 is complete: src/amp_library.jl provides load_amp_species_library and amp_species_deb_params to convert AmP JSON records to DEBAxisParams.
  Current example work should use amp_species_deb_params with fish_profile-derived exposure/mapping assumptions; do not implement new package features unless asked.
  ECOTOX parser extracts NOEC/EC50 grouped by taxon/effect and still needs adapters into mappings or DEB-axis burden.
