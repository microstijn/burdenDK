        - "confidence"
        - "notes"
      behavior: "Validates required fields, rho in [0,1), and K finite >= 0. Throws ArgumentError if invalid."
    compound_retention:
      signature: "compound_retention(cas; memory_library=nothing)::Float64"
      behavior: "Returns data-driven rho; unknown or empty CAS returns 0.0; missing default CSV should raise clear error."
    compound_bioaccumulation_factor:
      signature: "compound_bioaccumulation_factor(cas; memory_library=nothing)::Float64"
      behavior: "Returns data-driven K; unknown or empty CAS returns 1.0; missing default CSV should raise clear error."
    ecotox_default_retention:
      signature: "ecotox_default_retention(cas; memory_library=nothing)::Float64"
      behavior: "Alias/wrapper around data-driven compound_retention."
    EcotoxExposureState:
      behavior: "Mutable state storing internal_burdens::Dict{String, Float64} keyed by normalized CAS."
    get_internal_burden:
      signature: "get_internal_burden(state::EcotoxExposureState, cas)::Float64"
      behavior: "Returns stored internal burden or 0.0 if absent."
    set_internal_burden!:
      signature: "set_internal_burden!(state::EcotoxExposureState, cas, value)::EcotoxExposureState"
      behavior: "Sets finite nonnegative internal burden under normalized CAS."
    reset_internal_burdens!:
      signature: "reset_internal_burdens!(state::EcotoxExposureState)::EcotoxExposureState"
      behavior: "Clears internal burden dictionary."
    update_internal_burden!:
      signature: "update_internal_burden!(state::EcotoxExposureState, cas, concentration; retention=nothing, bioaccumulation_factor=nothing, memory_library=nothing)::Float64"
      implemented_equation: "B_new = rho * B_old + (1.0 - rho) * K * concentration"
      priority_rules:
        retention:
          - "explicit numeric retention overrides all compounds"
          - "retention Dict uses normalized CAS keys where present"
          - "otherwise use compound_retention(cas; memory_library=memory_library)"
        bioaccumulation_factor:
          - "explicit numeric K overrides all compounds"
          - "K Dict uses normalized CAS keys where present"
          - "otherwise use compound_bioaccumulation_factor(cas; memory_library=memory_library)"
      validation: "concentration finite >=0; 0<=rho<1; K finite >=0; invalid explicit overrides throw ArgumentError."
    ecotox_records_to_deb_burden_stateful!:
      signature: "ecotox_records_to_deb_burden_stateful!(state::EcotoxExposureState, concentrations, records; retention=nothing, bioaccumulation_factor=nothing, memory_library=nothing)"
      behavior: >
        Normalizes concentration CAS keys, updates internal burden per compound, uses B as effective concentration in ECOTOX active stress,
        routes records to axes, and returns aggregate DEB burden. Leaves stateless ecotox_records_to_deb_burden untouched.
  test_coverage:
    - "Compound_Memory_Library.csv exists and has required columns including bioaccumulation_factor."
    - "All rho values satisfy 0 <= rho < 1 and all K values are finite >= 0."
    - "Specific K values checked: cadmium 10, mercury 20, sodium chloride 1, polyethylene 5."
    - "validate_compound_memory_record rejects missing/invalid K."
    - "compound_bioaccumulation_factor returns known K values and defaults unknown CAS to 1.0."
    - "update_internal_burden! preserves previous behavior when K=1."
    - "update_internal_burden! magnifies burden when K>1."
    - "Data-driven cadmium update with rho=0.9 and K=10 gives B=10 for C=10 from zero state."
    - "Stateful burden aggregation supports scalar K, Dict K, and data-driven K."
    - "Non-accumulative salt with rho=0 and K=1 matches stateless burden behavior."

current_runtime_usage_after_amp_ecotox_and_memory:
  full_stateful_empirical_chain_usage: |
    using TwoTimescaleResilience

    amp = load_amp_species_library()
    params = amp_species_deb_params(amp, "Abatus cordatus")

    ecotox = load_ecotox_library()
    memory = load_compound_memory_library()

    records = ecotox_filter_records(
        ecotox;
        cas = "7440-43-9",
        effect_code = "MOR"
    )

    state = EcotoxExposureState()
    concentrations = Dict("7440-43-9" => 100.0)

    burden = ecotox_records_to_deb_burden_stateful!(
        state,
        concentrations,
        records;
        memory_library = memory
    )

    response = ecotox_burden_to_response(burden, params)

    response.A
    response.lambda
    response.amplification
  stateless_vs_stateful_interpretation: >
    Stateless calculations use ambient concentration C directly. Stateful calculations update internal burden B using rho and K,
    then use B as effective concentration for ECOTOX active stress. After ambient C returns to zero, B can remain >0 and decay slowly,
    so amplification can persist after exposure ends.

