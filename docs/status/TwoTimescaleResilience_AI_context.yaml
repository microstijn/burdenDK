empirical_pipelines:
  amp_defense_pipeline:
    source_database: "Add-my-Pet allStat.mat"
    offline_builder: "src/AmP_Translator.jl"
    runtime_adapter: "src/amp_library.jl"
    current_json_library_path: "data/AmP_Species_Library.json"
    biological_role: "Species-specific defense bounds and DEB physiological parameters."
    adapter_mapping_to_runtime:
      A0: "DEBAxisParams.A0"
      alpha_axes: "DEBAxisParams.alpha_axes as NTuple{4, Float64}; order assimilation, maintenance, growth, reproduction"
      lambda_bounds.lambda_min: "DEBAxisParams.lambda_min"
      lambda_bounds.lambda_max: "DEBAxisParams.lambda_max"
      lambda_bounds.KA: "DEBAxisParams.KA"
    abatus_baseline_lambda0:
      formula: "lambda_min + (lambda_max - lambda_min) * A0 / (KA + A0)"
      expected_approx: 0.01097
  ecotox_attack_pipeline:
    source_database: "EPA ECOTOX ASCII database"
    offline_builder: "src/ECOTOXParser.jl"
    runtime_adapter: "src/ecotox_library.jl"
    current_json_library_path: "data/ECOTOX_Toxicity_Library.json"
    biological_role: "Empirical attack parameters: NEC/NOEC thresholds, EC50/tolerance scaling, taxonomic and effect-code routing."
    runtime_capabilities_reported:
      - "Loads and validates committed data/ECOTOX_Toxicity_Library.json."
      - "Computes active stress using max(0, C_or_B - NOEC)/(EC50 - NOEC)."
      - "Routes ECOTOX effect codes to DEB axes."
      - "Converts one ECOTOX record + concentration/internal burden to a four-axis DEB burden."
      - "Aggregates multiple ECOTOX records/chemicals axis-wise into one DEB burden."
      - "Combines ECOTOX burden with DEBAxisParams to compute A, lambda, and amplification."
      - "Filters records by CAS, taxon_class, and effect_code."
    effect_routing_current:
      maintenance: ["MOR", "ITX", "MPH", "BEH", "POP", "ENZ", "FDB"]
      growth: ["GRO", "DVP"]
      reproduction: ["REP", "FEC"]
      assimilation: ["BCM", "FEED", "FED", "ING", "FOOD"]
    effect_routing_note: "Unknown effect codes throw ArgumentError; ambiguous listed systemic codes route to maintenance as explicit placeholder."
  compound_memory_pipeline:
    data_file: "data/Compound_Memory_Library.csv"
    runtime_adapter: "src/ecotox_library.jl"
    biological_role: "Compound-specific internal burden carryover and bioaccumulation/magnification for persistent compounds."
    implemented_update: "B_new = rho * B_old + (1 - rho) * K * C"
    default_behavior:
      unknown_retention: 0.0
      unknown_bioaccumulation_factor: 1.0
      stateless_limit: "rho=0 and K=1 gives B=C"
    relation_to_ecotox: "ECOTOX thresholds act on effective concentration/internal burden B for stateful calculations."
    relation_to_deb: "Stateful ECOTOX burden is fed to ecotox_burden_to_response with DEBAxisParams."

