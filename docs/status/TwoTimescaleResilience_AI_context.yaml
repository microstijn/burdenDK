      - "somatic allocation fraction kappa"
      - "energy conductance v"
      - "maximum structural length L_m"
      - "baseline adaptive margin A0"
      - "axis depletion coefficients alpha_axes"
      - "lambda_min"
      - "lambda_max"
      - "KA"
