    using .ECOTOXParser

    cas_list = ["50-00-0", "7440-43-9"]

    summary = build_ecotox_toxicity_library_multi(
        results_path,
        tests_path,
        species_path,
        cas_list;
        output_path = joinpath("data", "ECOTOX_Toxicity_Library.json")
    )
  design_note: >
    The final intended ECOTOX data product is one unified flat JSON array containing many compounds, not one database per CAS.

