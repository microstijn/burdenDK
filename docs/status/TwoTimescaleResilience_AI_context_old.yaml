    Demonstrate the AmP runtime adapter in a multi-species, synthetic ISIMIP-style workflow using 3x3 grids and CairoMakie heatmaps.
    It loads data/AmP_Species_Library.json, obtains DEBAxisParams for multiple species including Abatus cordatus,
    runs existing pipelines, and graphs amplification grids.
  key_scientific_result_observed: >
    Low cumulative stress produces amplification near 1. Moderate cumulative stress can show spatial gradients.
    High cumulative stress can push A below zero and collapse lambda to lambda_min, making amplification spatially uniform per species.
    This saturation is expected model behavior, not a plotting bug.
  constraints:
    - "Do not modify src/ code for this example."
    - "Do not implement ECOTOX or mixture toxicity in this example."
    - "Use fish_profile only for exposure_filter, moa_mapping, and moa_deb_mapping; replace deb_params with AmP-derived params."

