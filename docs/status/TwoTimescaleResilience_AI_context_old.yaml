implemented_ecotox_library_builder:
  status: "completed"
  date: "2026-05-24"
  scope: >
    Implemented CAS normalization layer and multi-compound ECOTOX toxicity library building. This remains a parser/library-builder layer,
    not a runtime active-stress or DEB-burden adapter.
  primary_file: "src/ECOTOXParser.jl"
  tests_file: "test/test_ecotox.jl"
  dependencies_used:
    - "CSV"
    - "DataFrames"
    - "Statistics"
    - "JSON"
  exports_expected:
    - "parse_ecotox_data"
    - "summarize_ecotox_endpoints"
    - "write_ecotox_library_json"
    - "build_ecotox_toxicity_library"
    - "normalize_cas"
    - "hyphenate_cas"
    - "build_ecotox_toxicity_library_multi"
  cas_normalization:
    normalize_cas:
      signature: "normalize_cas(cas)::String"
      behavior: "missing/nothing -> empty string; strips whitespace; removes all non-digit characters; returns digits-only string."
      examples:
        - "normalize_cas(\"50-00-0\") == \"50000\""
        - "normalize_cas(\"50000\") == \"50000\""
        - "normalize_cas(\" 7440-43-9 \" ) == \"7440439\""
        - "normalize_cas(\"CAS 50-00-0\") == \"50000\""
        - "normalize_cas(missing) == \"\""
        - "normalize_cas(nothing) == \"\""
    hyphenate_cas:
      signature: "hyphenate_cas(cas)::String"
      behavior: >
        Calls normalize_cas first. If fewer than 4 digits, returns normalized string. Otherwise formats as prefix-middle-check,
        where prefix is all digits except last 3, middle is second-to-last two digits, check is last digit.
      examples:
        - "hyphenate_cas(\"50000\") == \"50-00-0\""
        - "hyphenate_cas(\"50-00-0\") == \"50-00-0\""
        - "hyphenate_cas(\"50011\") == \"50-01-1\""
        - "hyphenate_cas(\"50022\") == \"50-02-2\""
        - "hyphenate_cas(\"7440439\") == \"7440-43-9\""
        - "hyphenate_cas(\"123\") == \"123\""
        - "hyphenate_cas(missing) == \"\""
        - "hyphenate_cas(nothing) == \"\""
  parser_matching:
    parse_ecotox_data: >
      target_cas and df.test_cas are compared using normalize_cas. Users can pass either digits-only CAS or hyphenated CAS.
      Empty-normalized target CAS throws ArgumentError.
  summary_schema:
    required_columns:
      - "cas"
      - "cas_norm"
      - "cas_hyphenated"
      - "taxon_class"
      - "effect_code"
      - "NOEC_median"
      - "EC50_median"
      - "n_NOEC"
      - "n_EC50"
    notes:
      - "cas is retained for backward compatibility and equals cas_norm."
      - "cas_norm is the stable digits-only matching key."
      - "cas_hyphenated is for readability/display."
      - "effect_code is uppercase stripped string."
      - "taxon_class is stripped string preserving original capitalization."
      - "Endpoint matching is case-insensitive for NOEC and EC50."
      - "EC50_median > NOEC_median is not enforced at parser stage; future runtime active-stress validation should handle denominator constraints."
  json_schema:
    structure: "flat array of records, not nested by CAS"
    example_record:
      cas: "50000"
      cas_norm: "50000"
      cas_hyphenated: "50-00-0"
      taxon_class: "Actinopterygii"
      effect_code: "MOR"
      NOEC_median: 2.0
      EC50_median: 4.5
      n_NOEC: 8
      n_EC50: 12
    missing_values: "Julia missing values are written as JSON null."
  multi_compound_builder:
    function: "build_ecotox_toxicity_library_multi(results_path, tests_path, species_path, target_cas_list; output_path=nothing, skip_empty=true)"
    behavior:
      - "Accepts multiple CAS values in digits-only or hyphenated form."
      - "Normalizes and deduplicates CAS values by cas_norm while preserving first-seen order."
      - "Throws ArgumentError for empty target_cas_list."
      - "Throws ArgumentError for CAS inputs that normalize to empty strings."
      - "Processes each unique cas_norm once."
      - "For empty parsed data, skip with warning when skip_empty=true."
      - "Combines summaries using vcat(...; cols=:union)."
      - "If all CAS produce no records, returns an empty DataFrame with the correct schema."
      - "If output_path is provided and all records are empty, still writes a valid JSON empty array [] to output_path."
      - "Always returns the combined summary DataFrame."
  test_coverage:
    - "normalize_cas handles hyphenated, digits-only, whitespace, text-prefixed, missing, and nothing inputs."
    - "hyphenate_cas handles digits-only, hyphenated, short, missing, and nothing inputs."
    - "parse_ecotox_data returns same rows for equivalent digits-only and hyphenated CAS when fixture supports both."
    - "parse_ecotox_data throws ArgumentError for empty-normalized CAS such as '---'."
    - "summarize_ecotox_endpoints emits cas, cas_norm, cas_hyphenated and required toxicity columns."
    - "write_ecotox_library_json writes flat JSON records containing cas_norm and cas_hyphenated."
    - "build_ecotox_toxicity_library returns summary DataFrame and writes JSON when output_path is provided."
    - "build_ecotox_toxicity_library_multi accepts duplicate CAS forms and deduplicates by cas_norm."
    - "build_ecotox_toxicity_library_multi writes one unified JSON file for multiple compounds."
    - "build_ecotox_toxicity_library_multi throws ArgumentError for empty CAS list and invalid empty-normalized CAS."

