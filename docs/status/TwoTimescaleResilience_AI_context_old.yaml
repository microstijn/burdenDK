communication_template_for_future_ai_sessions: |
  Project: TwoTimescaleResilience.jl in repository burdenDK.
  The package already has a runtime pipeline. Do not redesign it.
  Main runtime object: SpeciesProfile(name, exposure_filter, moa_mapping, moa_deb_mapping, deb_params, buffer_params).
  Core pipeline: values/layers -> ExposureFilter -> ModeOfActionMapping -> MoAToDEBMapping -> DEBAxisParams -> margin -> lambda -> amplification.
