    using TwoTimescaleResilience

    amp = load_amp_species_library()
    params = amp_species_deb_params(amp, "Abatus cordatus")
    lambda0 = restoring_force_from_margin(params.A0, params)
  expected_lambda0_for_abatus: "approximately 0.01097"
  profile_like_usage_without_amp_species_profile: |
    base_profile = fish_profile()
    exposure_filter = base_profile.exposure_filter
    moa_mapping = base_profile.moa_mapping
    moa_deb_mapping = base_profile.moa_deb_mapping
    deb_params = amp_species_deb_params(amp, "Abatus cordatus")

    result = isimip_deb_pipeline(
        zeros(7),
        exposure_filter,
        moa_mapping,
        moa_deb_mapping,
        deb_params
    )

