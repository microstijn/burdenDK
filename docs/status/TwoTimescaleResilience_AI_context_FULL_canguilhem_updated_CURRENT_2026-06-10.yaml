      status: "implemented/documented statistical comparison layer"
      main_utility_documented: "compare_vulnerability_feature_tranches"
      purpose: >
        Quantifies and interprets changes in ecological vulnerability regimes
        across time periods or tranches. It computes feature-delta summaries,
        spatial block bootstrap confidence intervals, categorical transition
        matrices, and cluster-distribution distances without running new models
        or creating new biological output states.
      supported_comparisons:
        - "continuous feature deltas with mean, median, min, max, p05, and p95 summaries"
        - "cluster area fractions"
        - "transition count matrices and transition-probability matrices"
        - "Total Variation Distance between cluster distributions"
        - "entropy and Jensen-Shannon Divergence between cluster distributions"
        - "relative regime-intensity score deltas based on centroid ranking"
        - "spatial block bootstrap confidence intervals for landscape-level mean deltas"
      statistical_cautions:
        - "Cluster IDs should be compared only under a fixed reference centroid system unless reclustering is treated explicitly as a sensitivity analysis."
        - "Pixel-wise p-values are not recommended or supported because grid cells are spatially autocorrelated."
        - "Use landscape-level uncertainty intervals from spatial block bootstrap instead of pixel-wise significance testing."
        - "Relative intensity scores are interpretive aids, not absolute thresholds or safe/unsafe classes."
      does_not_do:
        - "Does not run compound memory recurrence or toxicokinetics."
        - "Does not implement starvation, DEBkiss physiological condition changes, DEBtox scaled damage, or GUTS survival."
        - "Does not ingest ISIMIP rasters or output NetCDF files."
        - "Does not calculate regulatory limit violations or safe/unsafe conditions."
      future_work: >
