    dynqual_synthetic_isimip_pressure_demo_md:
      file: "dynqual_synthetic_isimip_pressure_demo.md"
      status: "implemented/documented demo"
      main_script: "examples/dynqual_synthetic_isimip_pressure_demo.jl"
      plotting_script: "examples/plot_dynqual_synthetic_isimip_pressure_demo.jl"
      output_directory: "output/dynqual_synthetic_isimip_pressure_demo/"
      purpose: >
        Demonstrates how TwoTimescaleResilience can process gridded water-quality
        model outputs for water-quality modellers familiar with DynQual or ISIMIP.
        The script reads real DynQual spatial-temporal patterns over Europe and
        derives synthetic ISIMIP-style pressure archetypes such as organic oxygen
        demand, pathogen exposure, and ionic stress.
      required_environment_variables:
        - "TTR_DYNQUAL_BOD_FILE: path to organic_monthlyAvg_1980_2019.nc"
        - "TTR_DYNQUAL_FC_FILE: path to pathogen_monthlyAvg_1980_2019.nc"
        - "TTR_DYNQUAL_TDS_FILE: path to TDSload_monthlyAvg_1980_2019.nc"
        - "TTR_DYNQUAL_BODLOAD_FILE: path to BODload_monthlyAvg_1980_2019.nc"
      important_interpretation_note: >
        Raw DynQual variables such as BOD, pathogen/FC, TDS load, and BOD load
        are not treated as measured individual chemicals. They provide realistic
        spatial-temporal patterns used to construct transparent synthetic pressure
        proxies. The resulting vulnerability regimes are threshold-free relative
        response regimes, not safe/unsafe regulatory classes.
      memory_conscious_execution:
        - "Streams monthly NetCDF slices using NCDatasets."
        - "Estimates robust scaling quantiles by deterministic sampling over time and space."
        - "Avoids materialising full monthly raw, scaled, and response arrays simultaneously."
        - "Carries pressure memory B_state using current 2D state arrays only."
        - "Supports optional spatial stride for reduced memory use."
        - "Disables NetCDF outputs by default for memory safety."
      cache_and_replotting:
        cache_file: "dynqual_demo_cache.nc"
        metadata_file: "dynqual_feature_metadata.csv"
        cache_env_var: "TTR_DYNQUAL_WRITE_CACHE"
        output_dir_env_var: "TTR_DYNQUAL_DEMO_OUTPUT_DIR"
        note: >
          The plotting script can regenerate figures from the cache and metadata
          without access to the original DynQual NetCDF files.
      generated_figures_documented:
        - "dynqual_raw_climatology_maps.png"
        - "dynqual_derived_pressure_layers.png"
        - "dynqual_vulnerability_regime_maps.png"
        - "dynqual_regime_explanation_heatmap.png"
        - "dynqual_baseline_recent_comparison.png"
      limitations:
        - "Diagnostic communication demo, not a formal risk assessment."
        - "Not a generalized raster-ingestion pipeline for TwoTimescaleResilience."
        - "Pressure proxies are synthetic, despite using real DynQual spatial-temporal patterns."

    archetype_compound_memory_multitranche_grid_demo_md:
      file: "archetype_compound_memory_multitranche_grid_demo.md"
      status: "implemented/documented demo"
