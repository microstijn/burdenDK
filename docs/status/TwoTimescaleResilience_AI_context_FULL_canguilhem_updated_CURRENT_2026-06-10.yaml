# TwoTimescaleResilience / burdenDK AI Context File
# Purpose: rich, machine-readable project memory for future AI assistants and coding tools.
# This version intentionally preserves full project context, not only a compact state snapshot.

metadata:
  file_name: "TwoTimescaleResilience_AI_context.yaml"
  last_updated: "2026-05-28"
  update_reason: >
    Full-context final update after AmP runtime adapter, ECOTOX parser/library-builder,
    ECOTOX runtime adapter, data-driven compound memory, bioaccumulation-factor extension,
    monthly memory diagnostics, analytical species response-capacity diagnostics, TeX documentation
    with visual 3x3 toy grids plus second-month memory carryover grid, and manuscript vocabulary
    clarification: use capacity--pressure--memory for Canguilhemian framing while retaining
    defence--attack--memory as implementation/runtime shorthand only.
  intended_reader: "AI coding assistants and future Copilot/LLM sessions"
  design_goal: >
    Preserve enough narrative and technical context for a fresh AI to understand what the project is about,
    what has already been implemented, why the architecture exists, and what should happen next.

project:
  repository_directory_name: "burdenDK"
  main_framework_name: "TwoTimescaleResilience"
  main_julia_module: "TwoTimescaleResilience"
  language: "Julia"
  local_path_observed: "C:\\Users\\peete074\\OneDrive - Wageningen University & Research\\programming\\burdenDK"
  one_sentence_summary: >
    TwoTimescaleResilience is a species-aware Julia framework that combines environmental pressure,
    ECOTOX-derived stressor parameters, compound memory, and Add-my-Pet-derived organismal capacity parameters
    to compute Dynamic Energy Budget-informed adaptive margin, restoring force, and amplification of acute-event burden.
  scientific_identity: >
    The model is not a generic hazard index. It is a mechanistic vulnerability framework: chronic/background stress
    depletes physiological adaptive margin; depleted adaptive margin weakens restoring force; weaker restoring force
    amplifies the response burden of future acute perturbations.

ai_usage_instructions:
  - "Do not redesign the package architecture unless explicitly asked."
  - "Treat SpeciesProfile as the central runtime object for ISIMIP-style workflows."
  - "Treat src/isimip_deb_pipeline.jl as the existing spatial/runtime engine."
  - "Treat AmP, ECOTOX, and Compound Memory as empirical data/adapters layered onto existing runtime machinery."
  - "Prefer adapter functions, examples, diagnostics, and tests over rewrites."
  - "Keep chemical memory B_t separate from physiological condition memory Z_t."
  - "Do not jump to raster integration before validating monthly-memory and response-capacity diagnostics."
  - "Do not modify DEB equations, AmP translation, ECOTOXParser, or ISIMIP pipeline unless explicitly asked."
  - "When implementing new capabilities, use tranches with tests passing before moving to the next tranche."
  - "In manuscript prose, prefer Canguilhemian capacity--pressure--memory language; reserve defence--attack--memory for code/runtime shorthand."

scientific_purpose:
  problem_statement: >
    Traditional environmental vulnerability assessments often map stressors directly to hazard indices or threshold exceedance.
    This framework instead maps chronic background stress into physiological depletion of a species-specific adaptive margin,
    then computes how that depletion weakens recovery/restoring force. The output is an amplification factor that describes
    how much larger the response burden of an acute event becomes under stressed background conditions.
  conceptual_innovations:
    - "Adaptive Margin A is a macroscopic DEB-derived state variable representing physiological buffering capacity."
    - "Vulnerability is defined as amplification of acute perturbation burden caused by reduced background-conditioned restoring force."
    - "Two separated timescales avoid requiring Jacobian ecosystem matrices over large spatial rasters."
    - "Fubini's theorem shows integrated response burden scales as 1/lambda."
    - "Species defense parameters are anchored in Add-my-Pet DEB data."
    - "Stressor attack parameters are anchored in ECOTOX-derived NOEC/EC50/effect/taxon summaries."
    - "Compound memory separates retention/carryover rho from bioaccumulation/internal magnification K."
    - "Formal mixture toxicity is planned to replace purely additive placeholder interactions."
  key_modeling_separation:
    defense: "Runtime shorthand for AmP-derived species physiological parameters: A0, alpha_axes, lambda_min, lambda_max, KA."
    attack: "Runtime shorthand for ECOTOX-derived chemical effect thresholds and effect-code routing: NOEC, EC50, taxon_class, effect_code."
    memory: "Compound-level internal burden carryover and bioaccumulation: rho and K."
    response: "DEB adaptive margin, restoring force, and amplification."
    manuscript_preferred_terms:
      defense: "capacity / normative latitude"
      attack: "pressure / milieu challenge"
      memory: "historical conditioning through retained internal burden"
      response: "narrowed adaptive margin -> reduced restoring force -> amplification"


# Manuscript vocabulary and Canguilhemian framing.
# This section records an editorial/conceptual decision from the 2026-05-25 manuscript discussion.
canguilhemian_manuscript_framing:
  central_decision: >
    Do not present attack--defence as the philosophical foundation of the paper. It is acceptable as
    implementation shorthand because AmP and ECOTOX are operationally opposite empirical layers, but
    the manuscript should use the more Canguilhemian vocabulary of capacity--pressure--memory.
  rationale: >
    Canguilhem's language is not that an organism merely defends a fixed normal state against attack.
    Health is better framed as the living system's capacity to establish and re-establish viable norms
    in relation to a changing milieu. Chronic environmental pressure and retained internal burden narrow
    this normative latitude. Adaptive margin is the model's tractable proxy for remaining normative
    latitude; restoring force is its practical recovery expression; amplification measures the consequence
    of that latitude being narrowed before a later perturbation.
  preferred_manuscript_terms:
    capacity: "AmP-derived DEB parameters; organismal or species-specific physiological capacity/normative latitude."
    pressure: "ECOTOX-derived stressor evidence and environmental concentrations; milieu challenge or environmental pressure."
    memory: "Compound internal burden B_t; exposure history retained through rho and K."
    adaptive_margin: "Remaining norm-establishing latitude, represented by A."
    restoring_force: "Practical recovery capacity, represented by lambda(A)."
    amplification: "Consequence of narrowed normative latitude, represented by F."
  implementation_shorthand:
    allowed: "defence--attack--memory can remain in code comments, YAML implementation summaries, and developer discussions."
    manuscript_translation: "defence--attack--memory should be translated to capacity--pressure--memory in manuscript prose."
  terminology_mapping:
    runtime_defence: "capacity / normative latitude / physiological response capacity"
    runtime_attack: "pressure / milieu challenge / environmental constraint"
    compound_memory_B_t: "historical conditioning of exposure through retained internal burden"
    adaptive_margin_A: "remaining capacity to tolerate, absorb, or reorganise under pressure"
    lambda: "state-dependent recovery/restoring capacity"
    F: "burden amplification caused by narrowed response capacity"
  recommended_manuscript_sentence: >
    Operationally, the implementation can be described as a defence--attack--memory architecture:
    AmP-derived DEB parameters describe target capacity, ECOTOX-derived records describe stressor
    pressure, and compound memory describes retained internal burden. This terminology is used as a
    runtime shorthand rather than as the conceptual foundation of the model. In Canguilhem's terms,
    chronic features of the milieu can narrow the organism's capacity to establish and re-establish
    viable norms. In the present framework, adaptive margin is a tractable proxy for that remaining
    normative latitude, and amplification measures the consequence of its contraction.
  avoid_in_manuscript:
    - "Do not imply the organism defends a fixed normal state."
    - "Do not make attack--defence the philosophical framing."
    - "Do not use militaristic language where capacity--pressure language is clearer."
    - "Do not conflate Canguilhemian normativity with homeostatic return to a fixed baseline."
  concise_philosophical_formula: >
    milieu pressure + exposure history -> narrowed normative latitude -> reduced restoring force ->
    amplified burden of future perturbation.

mathematical_framework:
  notation:
    grid_cell: "g"
    time_or_month_index: "t or m"
    species_or_target_group: "q"
    ambient_chemical_concentration: "C_{j,t}"
    internal_chemical_burden: "B_{j,t}"
    retention_factor: "rho_j"
    bioaccumulation_factor: "K_j"
    active_ecotox_stress: "x_{j,t}"
    deb_axis_burden: "s_t = (s_A, s_M, s_G, s_R)"
    adaptive_margin: "A_t"
    restoring_force: "lambda_t"
    amplification_factor: "F_t or mathcal{F}_t"
  chemical_memory:
    equation: "B_{j,t} = rho_j * B_{j,t-1} + (1 - rho_j) * K_j * C_{j,t}"
    meaning:
      rho: "monthly persistence/carryover; 0 means no memory; values near 1 mean slow decay"
      K: "equilibrium internal magnification factor; K=1 preserves concentration scale; K>1 represents bioaccumulation/internal load magnification"
    limiting_cases:
      stateless_equivalence: "rho=0 and K=1 gives B_t=C_t"
      retention_only: "rho>0 and K=1 gives lag/carryover without magnification"
      bioaccumulation: "rho>0 and K>1 gives carryover plus magnified internal burden"
      constant_exposure_equilibrium: "for constant C, B_t tends to K*C"
  ecotox_active_stress:
    equation: "x = max(0, B_or_C - NOEC) / (EC50 - NOEC)"
    rules:
      - "Use ambient concentration C for stateless calculations."
      - "Use internal burden B for stateful calculations."
      - "EC50 must be greater than NOEC."
      - "Stress is not clamped at 1; exposure above EC50 can produce x > 1."
  deb_axis_mapping:
    axis_order: ["assimilation", "maintenance", "growth", "reproduction"]
    effect_routing_current:
      maintenance: ["MOR", "ITX", "MPH", "BEH", "POP", "ENZ", "FDB"]
      growth: ["GRO", "DVP"]
      reproduction: ["REP", "FEC"]
      assimilation: ["BCM", "FEED", "FED", "ING", "FOOD"]
  adaptive_margin:
    equation_no_Z: "A_t = A0 - dot(alpha_axes, s_t)"
    equation_future_with_Z: "A_t = A0 + omega_Z * Z_t - dot(alpha_axes, s_t)"
  restoring_force:
    equation: "lambda(A) = lambda_min + (lambda_max - lambda_min) * max(A,0) / (KA + max(A,0))"
    derivative: "d lambda / dA = (lambda_max - lambda_min) * KA / (KA + A)^2 for A > 0"
  amplification:
    equation: "F_t = lambda(A0) / lambda(A_t)"
    derivation_basis: "For dy/dt = -lambda*y + q_c*C_event(t), AUC_y = q_c*AUC_C/lambda by Fubini's theorem."
  analytical_response_capacity:
    fmax: "Fmax = lambda(A0) / lambda_min"
    single_axis_collapse: "x_collapse_axis = A0 / alpha_axis, or Inf if alpha_axis <= 0"

runtime_architecture:
  core_runtime_structs:
    DEBAxisParams:
      role: "Primary species defense parameter object; target of AmP adapter."
      fields: ["A0", "alpha_axes", "lambda_min", "lambda_max", "KA", "recovery_axes", "use_axis_recovery_penalty", "use_buffer_recovery_factor", "beta_Z"]
    EcotoxExposureState:
      role: "Mutable runtime state carrying internal compound burdens across months."
    ExposureFilter:
      role: "Species/contact/habitat multipliers for environmental variables."
    ModeOfActionMapping:
      role: "Environmental-variable-to-mode-of-action mapping for ISIMIP-style workflows."
    MoAToDEBMapping:
      role: "Mode-of-action-to-DEB-axis mapping for ISIMIP-style workflows."
    SpeciesProfile:
      role: "Central runtime integration object for species-aware spatial workflows."
    ConditionBufferParams:
      role: "Optional organism-level condition/reserve memory; not yet activated for monthly physiological carryover."
  pipeline_modes:
    isimip_style_pipeline: ["raw variables/layers -> ExposureFilter", "effective exposure -> ModeOfActionMapping", "modes -> MoAToDEBMapping", "DEB-axis burdens -> A", "A -> lambda -> F"]
    ecotox_stateless_pipeline: ["load ECOTOX records", "ambient C -> x", "effect_code -> DEB-axis burden", "burden + DEBAxisParams -> A, lambda, F"]
    ecotox_stateful_memory_pipeline: ["load Compound_Memory_Library.csv", "C_t + EcotoxExposureState -> B_t", "B_t -> x_t", "records -> DEB-axis burden -> A, lambda, F"]

package_structure:
  root_directories:
    data:
      role: "Committed empirical/runtime data and raw/semi-raw ECOTOX data."
      important_files: ["data/AmP_Species_Library.json", "data/ECOTOX_Toxicity_Library.json", "data/Compound_Memory_Library.csv"]
    src:
      role: "Julia package implementation."
    test:
      role: "Julia unit/integration tests."
    examples:
      role: "Executable demos and diagnostics."
    output:
      role: "Generated diagnostic figures and CSV outputs."
    docs:
      role: "Manuscript/documentation material including TeX derivations."
  src_files:
    TwoTimescaleResilience.jl: "Main module entrypoint; includes/exports runtime adapters."
    amp_library.jl: "Runtime AmP JSON loader and DEBAxisParams adapter."
    ECOTOXParser.jl: "Offline ECOTOX ASCII parser and multi-compound toxicity library builder."
    ecotox_library.jl: "Runtime ECOTOX loader, validator, stress, routing, burden, response, record filtering, and compound memory/stateful functions."
    deb_axes.jl: "Adaptive margin, restoring force, amplification, and DEB-axis functions."
    isimip_deb_pipeline.jl: "Existing scalar/grid ISIMIP-style runtime pipeline."
    exposure_filters.jl: "Exposure/contact multipliers."
    mode_of_action.jl: "Environmental variables to mode-of-action transformations."
    moa_deb_mapping.jl: "Mode-of-action to DEB-axis transformations."
    default_isimip_moa.jl: "Default ISIMIP variable-to-MoA mapping."
    species_defaults.jl: "Default SpeciesProfile constructors."

