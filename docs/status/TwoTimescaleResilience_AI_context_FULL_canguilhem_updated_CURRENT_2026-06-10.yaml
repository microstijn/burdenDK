project_state_update_2026_05_28:
  summary: >
    The project has moved beyond the 2026-05-25 state. Current work has clarified the relation
    to DEB, DEBkiss, and DEBtox; implemented and validated axis-level mixture-effect models;
    introduced a grouped concentration-addition-then-independent-action model; added a focused
    mixture-overlap diagnostic; planned an AmP species archetype database; and begun implementing
    threshold-free vulnerability feature-vector machinery as core package functionality.

  conceptual_positioning:
    deb_relation:
      status: "clarified"
      summary: >
        TwoTimescaleResilience is DEB-informed, not a full DEB, DEBkiss, or DEBtox implementation.
        It uses assimilation, maintenance, growth, and reproduction as DEB/DEBtox-compatible
        physiological process axes, but it does not simulate DEB reserve, structure, maturity,
        mobilisation, growth ODEs, reproduction ODEs, starvation, survival, or kappa allocation.
      use_from_deb:
        - "Physiological process-axis vocabulary: assimilation, maintenance, growth, reproduction."
        - "AmP-derived species capacity parameters and response-capacity diagnostics."
        - "DEB/DEBtox as conceptual discipline for routing stressors to physiological process axes."
      avoid_from_deb:
        - "Do not introduce reserve E, structure V, maturity E_H, reproduction buffer E_R, or DEB flux notation unless actually implemented."
        - "Do not introduce kappa or κ allocation."
        - "Do not call framework variables true DEB state variables."
        - "Do not imply adaptive margin A_t is a standard DEB variable."
      debtox_relation:
        status: "clarified"
        summary: >
          DEBtox already studies compound effects on DEB physiological processes, especially
          assimilation, maintenance, growth, and reproduction. The project learns from that axis
          discipline, but it does not currently implement DEBtox scaled damage D, damage repair,
          GUTS survival, starvation, or fitted pMoA/TKTD parameters.
      scaled_damage:
        current_status: "not implemented"
        interpretation: >
          DEBtox scaled damage D is a concentration-scaled TKTD state between exposure and effect.
          TwoTimescaleResilience currently has chemical memory B_t, active stress x_t, axis impairment
          E_axis, adaptive margin A_t, and amplification F_t; none of these should be called DEBtox
          scaled damage.
        possible_future_extension: >
          A future optional TKTD layer could add C_t or B_t -> D_t -> x_t before the existing
          mixture-effect layer. This should be a separate task and must remain distinct from B_t,
          E_axis, and A_t.

  regulatory_and_water_quality_motivation:
    summary: >
      The project rationale has been sharpened around the limitations of large-scale water-quality
      modelling. Current water-quality practice is often focused on single-compound regulatory limits
      and threshold exceedance. That is necessary but can miss chronic, cumulative, persistent,
      mixture-mediated, and temporally delayed background pressure: informally, "broeiende vervuiling".
    central_problem: >
      Monthly or annual water-quality fields and regulatory exceedance maps often show concentration
      states, but not how exposure history and mixtures erode organismal response capacity before a
      discrete endpoint failure or limit exceedance is observed.
    preferred_framing: >
      The model should be positioned as capacity--pressure--memory: chronic milieu pressure and
      retained burden narrow adaptive margin; narrowed adaptive margin weakens restoring force; weaker
      restoring force amplifies later acute burden.

  mixture_effect_models:
    status: "implemented and tested"
    source_location: "src/mixture_aggregation.jl or equivalent mixture aggregation source file"
    test_location: "test/test_mixture_aggregation.jl and response-mode tests"
    implemented_models:
      axis_toxic_unit_sum:
        formula: "X_a = sum_j x_{j,a}; E_a = X_a / (1 + X_a)"
        interpretation: "Same-axis burdens are summed before bounded transformation."
      independent_action_axis_effects:
        formula: "E_{j,a} = x_{j,a}/(1+x_{j,a}); E_a = 1 - prod_j(1 - E_{j,a})"
        interpretation: "Compound-level bounded effects are combined independently within an axis."
      grouped_ca_then_ia_axis_effects:
        formula: >
          Within each DEB axis and effect_code group, X_{a,g}=sum_j x_{j,a} and
          E_{a,g}=X_{a,g}/(1+X_{a,g}); across groups, E_a=1-prod_g(1-E_{a,g}).
        grouping_rule: "Group by DEB axis plus effect_code; missing effect_code defaults to unknown_effect_code if needed."
        interpretation: >
          Uses effect_code as an empirical grouping proxy, not as confirmed physiological mode of action.
          Same-axis/same-effect_code records are treated concentration-additively; distinct groups are
          combined as independent bounded effects.
    terminology_note: >
      These are mixture-effect assumptions or null mixture models, not true compound interaction models.
      Do not describe them as synergism or antagonism.
    invariants:
      - "No synergism/antagonism implemented."
      - "No fitted interaction coefficients implemented."
      - "No arbitrary interaction matrices implemented."
      - "No kappa/gain/response_scale/burden_to_margin_multiplier introduced."

  response_mode_and_multiaxis_diagnostic_status:
    status: "validated after grouped model integration"
    main_example: "examples/ecotox_amp_multiaxis_response_calibrated_demo.jl"
