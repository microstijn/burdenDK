      plotting_script: "examples/plot_archetype_compound_memory_multitranche_grid_demo.jl"
      output_directory: "output/archetype_compound_memory_multitranche_grid_demo"
      purpose: >
        Deterministic synthetic/algorithmic grid simulation integrating real AmP
        species archetypes and actual compound-memory records evaluated via
        ECOTOX across continuous timeframes or tranches. It focuses on
        threshold-free vulnerability regimes and progressive ecological exposure
        without inventing threshold-breach logic.
      architecture_notes:
        - "Builds on the 10-year archetype compound-memory grid setup."
        - "Carries B_t chemical memory continuously across tranches instead of re-warming each tranche."
        - "Uses Tranche 1 standardisation and centroid positions as fixed reference for later tranches."
        - "Applies deterministic non-uniform temporal shifts using tranche_trajectory_profile multipliers across an approximately 0.85--1.25 bandwidth logic."
        - "Writes centroid-assignment diagnostics to detect degeneracy or model failure states."
      fixed_reference_clustering_rules:
        - "Later tranches are assigned to baseline centroids using standardized nearest-neighbor Euclidean distance."
        - "Features must hold comparable meanings across tranches."
        - "Absolute simulation-month features such as month_of_max_* are excluded from fixed-reference clustering."
        - "Timing features, if used, should be transformed into within-tranche month, month-of-year, or cyclic seasonal phase."
      documented_usage_environment_variables:
