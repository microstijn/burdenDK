communication_template_for_future_ai_sessions: |
  Project: TwoTimescaleResilience.jl in repository burdenDK.
  Do not redesign the package. The runtime pipeline already exists.
  AmP defense is complete via src/amp_library.jl and data/AmP_Species_Library.json.
  ECOTOX attack is complete via ECOTOXParser.jl for offline JSON building and src/ecotox_library.jl for runtime loading, validation, active stress, effect routing, DEB burden, response, and filtering.
  Compound memory is complete via data/Compound_Memory_Library.csv and stateful ECOTOX functions. The implemented equation is B_new = rho*B_old + (1-rho)*K*C.
  Analytical response-capacity diagnostics are complete and produce amp_species_response_capacity.csv with Fmax and x_collapse metrics.
  The latest TeX documentation includes both mathematical derivation and 3x3 toy grids, including a second-month memory carryover grid.
  Next logical work is the 3 species x 3 compounds x 12 months diagnostic example and diagnostic plots. Do not jump to real rasters or physiological Z_t prematurely.
