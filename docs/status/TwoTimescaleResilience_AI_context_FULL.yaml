    purpose: "Consume committed ECOTOX JSON and compute stateless DEB-axis burden and response."
  compound_memory_and_bioaccumulation:
    status: "completed"
    primary_file: "src/ecotox_library.jl"
    data_file: "data/Compound_Memory_Library.csv"
    tests_file: "test/test_ecotox_library.jl"
    exports_expected: ["load_compound_memory_library", "validate_compound_memory_record", "compound_retention", "compound_bioaccumulation_factor", "ecotox_default_retention", "EcotoxExposureState", "get_internal_burden", "set_internal_burden!", "reset_internal_burdens!", "update_internal_burden!", "ecotox_records_to_deb_burden_stateful!"]
    implemented_equation: "B_new = rho * B_old + (1.0 - rho) * K * concentration"
    behavior_notes:
      - "Stateful function mutates EcotoxExposureState."
      - "Stateful burden uses internal burden B as effective concentration in ECOTOX stress."
      - "Stateless ecotox_records_to_deb_burden remains unchanged."
