important_runtime_usage:
  stateless_ecotox_chain: |
    amp = load_amp_species_library()
    params = amp_species_deb_params(amp, "Abatus cordatus")
    ecotox = load_ecotox_library()
    records = ecotox_filter_records(ecotox; cas="7647-14-5", effect_code="MOR")
    burden = ecotox_records_to_deb_burden(Dict("7647-14-5" => 20.0), records)
    response = ecotox_burden_to_response(burden, params)
  stateful_memory_chain: |
    amp = load_amp_species_library()
    params = amp_species_deb_params(amp, "Abatus cordatus")
    ecotox = load_ecotox_library()
    memory = load_compound_memory_library()
    records = ecotox_filter_records(ecotox; cas="7440-43-9", effect_code="MOR")
    state = EcotoxExposureState()
    burden = ecotox_records_to_deb_burden_stateful!(
        state,
        Dict("7440-43-9" => 100.0),
        records;
        memory_library=memory
    )
    response = ecotox_burden_to_response(burden, params)
  response_capacity_formulae: |
    lambda0 = restoring_force_from_margin(params.A0, params)
    Fmax = lambda0 / params.lambda_min
    x_collapse_axis = params.A0 / alpha_axis

