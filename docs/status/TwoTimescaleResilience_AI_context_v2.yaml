  intended_reader: "AI coding assistants and future Copilot/LLM sessions"

project:
  repository_directory_name: "burdenDK"
  main_framework_name: "TwoTimescaleResilience"
  main_julia_module: "TwoTimescaleResilience"
  language: "Julia"
  one_sentence_summary: >
    TwoTimescaleResilience maps environmental stressors, ECOTOX toxicological attack records,
    compound memory states, and AmP-derived species defense parameters into Dynamic Energy
    Budget-informed adaptive margin, restoring force, and amplification outputs.

ai_usage_instructions:
  - "Do not redesign the package architecture unless explicitly asked."
  - "Treat SpeciesProfile as the central runtime object for ISIMIP-style workflows."
  - "Treat src/isimip_deb_pipeline.jl as the existing spatial/runtime engine."
  - "Treat AmP, ECOTOX, and Compound Memory as empirical data/adapters layered onto existing runtime machinery."
  - "Prefer examples, diagnostics, and adapter functions over rewrites."
  - "Keep chemical memory B_t separate from physiological condition memory Z_t."
  - "Do not jump to raster integration before validating monthly-memory and response-capacity diagnostics."

core_model_summary:
  state_variables:
    ambient_concentration: "C_{j,t}"
    internal_chemical_burden: "B_{j,t}"
    active_ecotox_stress: "x_{j,t}"
    deb_axis_burden: "s_t = (s_A, s_M, s_G, s_R)"
    adaptive_margin: "A_t"
    restoring_force: "lambda_t"
    amplification_factor: "F_t"
  central_equations:
    chemical_memory: "B_{j,t} = rho_j * B_{j,t-1} + (1 - rho_j) * K_j * C_{j,t}"
    active_stress: "x_{j,t} = max(0, B_or_C - NOEC_j) / (EC50_j - NOEC_j)"
    adaptive_margin_no_Z: "A_t = A0 - dot(alpha_axes, s_t)"
    adaptive_margin_with_future_Z: "A_t = A0 + omega_Z * Z_t - dot(alpha_axes, s_t)"
    restoring_force: "lambda(A) = lambda_min + (lambda_max - lambda_min) * max(A,0) / (KA + max(A,0))"
    amplification: "F_t = lambda(A0) / lambda(A_t)"
    fmax: "Fmax = lambda(A0) / lambda_min"
    single_axis_collapse: "x_collapse_axis = A0 / alpha_axis, or Inf if alpha_axis <= 0"
  interpretation:
    - "rho controls monthly persistence/carryover."
    - "K controls equilibrium internal magnification/bioaccumulation."
    - "rho=0 and K=1 recovers stateless ECOTOX concentration behavior."
    - "Large active stress does not guarantee large amplification; amplification is bounded by Fmax and sensitivity of lambda(A)."

